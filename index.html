<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SDTI · 星露谷人格测试</title>
    <link rel="stylesheet" href="style.css">
    <!-- 可选：如果要用图标，可以引入FontAwesome；但非必须 -->
</head>
<body>
<div class="container">
    <!-- 初始欢迎界面 -->
    <div class="intro-panel" id="introPanel">
        <div class="chicken-area">
            <img class="chicken-gif" id="chickenGif" alt="可爱小鸡" />
            <div class="start-btn-wrapper">
                <button class="btn-start" id="startBtn">🌱 开始测试 🌱</button>
            </div>
        </div>
        <div class="intro-footer">
            <p>🐔 点我开始星露谷人格之旅～</p>
        </div>
    </div>

    <!-- 测试面板 -->
    <div class="test-panel" id="testPanel" style="display: none;">
        <div class="section-title">🌻 20道田园心选择题</div>
        <div class="questions-grid" id="questionsContainer"></div>
        <div class="submit-area">
            <button class="btn-submit" id="submitBtn">🌟 揭示我的星露谷人格 🌟</button>
        </div>
    </div>

    <!-- 结果面板 -->
    <div class="result-panel" id="resultPanel" style="display: none;">
        <div class="result-card" id="resultContent"></div>
        <footer>
            ⚡ 匹配算法：基于20道题理想答案模式匹配（汉明距离）。<br>
            🤖 个性化分析由 DeepSeek AI 生成，仅供参考娱乐。<br>
            ※ 头像路径：<code>./head/英文名.png</code>，小鸡动图：<code>./head/1.gif</code>
        </footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script> <!-- 如果不再需要雷达图可删除，但保留无妨 -->
<script src="script.js"></script>
</body>
</html>
